version: '3.8'

services:
  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-3100}:3100"
    environment:
      - NODE_ENV=production
      - PORT=3100
      - HOST=0.0.0.0
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - shipyard-network

  # Frontend UI
  ui:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "${UI_PORT:-8080}:80"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://api:3100
      - VITE_WS_URL=ws://api:3100
    networks:
      - shipyard-network

  # Redis (optional - for distributed state)
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shipyard-network

networks:
  shipyard-network:
    driver: bridge

volumes:
  redis-data: